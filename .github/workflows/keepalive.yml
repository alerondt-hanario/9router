name: Keep 9router Render Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping health endpoint
        run: |
          curl --fail --silent --show-error --max-time 20 \
            https://ninerouter-live.onrender.com/api/health
